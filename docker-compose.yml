version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: scouterfrc_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-scouterfrc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - scouterfrc_network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scouterfrc_backend
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-scouterfrc}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      TBA_API_KEY: ${TBA_API_KEY:-}
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - scouterfrc_network
    command: >
      bash -c "
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # React Frontend (development)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: scouterfrc_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - scouterfrc_network
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:

networks:
  scouterfrc_network:
    driver: bridge
